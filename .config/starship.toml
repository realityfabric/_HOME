Windows = " "          # nf-custom-windows

[directory]
style = "bold bg:blue fg:#000000"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰎆 "
"Pictures" = " "
"Code" = " "
"code" = " "

[git_branch]
symbol = "󰘬"
style = "bold bg:green fg:#000000"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bold bg:green fg:bright-red"
format = '[($all_status$ahead_behind )]($style)'

[git_metrics]
added_style = "bold bg:green fg:bright-blue"
deleted_style = "bold bg:green fg:bright-red"
disabled = false
format = "([+$added]($added_style))([-$deleted]($deleted_style))"

[c]
symbol = "C"
style = "bold bg:yellow fg:bright_red"
version_format = "v${major}.${minor}"
format = '[ $symbol ($version)]($style)'

[cmake]
symbol = " "
style = "bold bright-red bg:yellow"
version_format = "v${major}.${minor}"
format = '[ $symbol ($version)]($style)'

[cobol]
style = "bold bright-red bg:yellow"
version_format = "v${major}.${minor}"
format = '[ $symbol ($version)]($style)'

[nodejs]
symbol = ""
style = "bold bright-red bg:yellow"
version_format = "v${major}.${minor}"
format = '[ $symbol ($version)]($style)'

[rust]
symbol = "🦀" # I know there's an official logo, but the crab is cute.
style = "bold bright-red bg:yellow"
version_format = "v${major}.${minor}"
format = '[ $symbol]($style)[($version)](fg:#000000 bg:yellow)'

[golang]
symbol = ""
style = "bold bright-red bg:yellow"
version_format = "v${major}.${minor}"
format = '[ $symbol ($version)]($style)'

[php]
symbol = "󰌟 "
style = "bold bright-red bg:yellow"
version_format = "v${major}.${minor}"
format = '[ $symbol ($version)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bold fg:#000000 bg:bright-purple"
format = '[󰥔 $time ]($style)'
