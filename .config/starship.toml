format = '[ $symbol ($version)]($style)'

[cobol]
style = "bold bright-red bg:yellow"
version_format = "v${major}.${minor}"
format = '[ $symbol ($version)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bold bright-red bg:yellow"
version_format = "v${major}.${minor}"
format = '[ $symbol ($version)]($style)'

[rust]
symbol = "рҹҰҖ" # I know there's an official logo, but the crab is cute.
version_format = "v${major}.${minor}"
format = '[ $symbol](bold fg:bright-red bg:blue)[($version) ](bg:blue fg:cyan)'

[golang]
symbol = "оңӨ"
style = "bold bright-red bg:yellow"
