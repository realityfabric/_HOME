[username]
disabled = false
show_always = false
style_root = "bold bg:bright-red fg:black"
style_user = "bold bg:blue fg:yellow2"
format = "[$user]($style)[ in ](bg:blue fg:cyan)"

[hostname]
disabled = false
ssh_only = true
ssh_symbol = "рҹҢҗ"
trim_at = "."
style = "bold bg:blue fg:yellow"
format = "[$ssh_symbol$hostname ]($style)"

[directory]
style = "bold bg:blue fg:cyan"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "у°ҺҶ "
"Pictures" = "пҖҫ "
"Code" = "п’° "
"code" = "п’° "

[git_branch]
symbol = "у°ҳ¬"
style = "bold bg:blue fg:cyan"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bold bg:blue fg:yellow"
format = '[($all_status$ahead_behind )]($style)'

[git_metrics]
added_style = "bold bg:blue fg:green"
deleted_style = "bold bg:blue fg:bright-red"
disabled = false
format = "([+$added]($added_style))([-$deleted]($deleted_style))[ ](bg:blue)"

[c]
symbol = "C"
style = "bold bg:blue fg:bright-red"
version_format = "v${major}.${minor}"
format = '[ $symbol ($version)]($style)'

[cmake]
symbol = "оһ” "
style = "bold bright-red bg:yellow"
