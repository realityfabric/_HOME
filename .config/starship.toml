# color constants:
# black, red, green, yellow,
# blue, purple, cyan, white

# bright color variants:
# add "bright-" before the color

format = """
[░▒▓](purple)\
$os\
[](bg:blue fg:purple)\
$directory\
[](bg:green fg:blue)\
$git_branch\
$git_status\
$git_metrics\
[](fg:green bg:yellow)\
$nodejs\
$rust\
$golang\
$php\
[](fg:yellow)\
$fill\
[◖](fg:bright-purple)\
$time\
[ ](fg:bright-purple)\
\n$character"""

add_newline = false

[os]
disabled = false
style = "bold bright-red bg:purple"
format = "[ $symbol]($style)"

