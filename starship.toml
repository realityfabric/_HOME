[directory]
style = "bold bg:blue fg:#000000"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "у°ҺҶ "
"Pictures" = "пҖҫ "
"Code" = "п’° "
"code" = "п’° "

[git_branch]
symbol = "у°ҳ¬"
style = "bold bg:green fg:#000000"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bold bg:green fg:bright-red"
format = '[($all_status$ahead_behind )]($style)'

[git_metrics]
added_style = "bold bg:green fg:bright-blue"
deleted_style = "bold bg:green fg:bright-red"
disabled = false
format = "([+$added]($added_style))([-$deleted]($deleted_style))"

[c]
symbol = "C"
style = "bold bg:yellow fg:bright_red"
version_format = "v${major}.${minor}"
format = '[ $symbol ($version)]($style)'

[cmake]
symbol = "оһ” "
